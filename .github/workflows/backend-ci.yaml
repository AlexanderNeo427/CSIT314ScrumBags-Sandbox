# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: ["dev/backend"]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16.8-alpine
        env:
          POSTGRES_DB: scrumbags_test_db
          POSTGRES_USER: scrumbags_username
          POSTGRES_PASSWORD: scrumbags_userpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Build Backend
        run: npm run build

      - name: Push schmema to Database
        env:
          DATABASE_URL: postgresql://scrumbags_user:scrumbags_password@localhost:5432/scrumbags_test_db
          NODE_ENV: test
        run: npm run db:push
